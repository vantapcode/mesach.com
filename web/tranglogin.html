<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng nhập - Mesach</title>
    <link rel="stylesheet" href="tranglogin.css" />
  </head>
  <body>
    <!-- HEADER -->
    <div class="header">
      <div class="logo">
        <a href="trangchumesach.html">
          <img src="../anh/meesach.jpg" alt="mesach" />
        </a>
      </div>

      <div class="search">
        <input type="text" placeholder="Tìm sách" />
        <button>🔍</button>
      </div>
    </div>

    <!-- FORM LOGIN -->
    <div class="login-box">
      <h2>Đăng nhập</h2>
      <form>
        <label>Số điện thoại/Email</label>
        <input type="text" placeholder="Nhập số điện thoại hoặc email" />

        <label>Mật khẩu</label>
        <input type="password" placeholder="Nhập mật khẩu" />

        <div class="btn-group">
          <button type="submit">Đăng Nhập</button>
          <button type="button">Đăng Ký</button>
        </div>

        <p class="forgot"><button>Quên mật khẩu?</button></p>
      </form>
    </div>
  </body>
</html>
